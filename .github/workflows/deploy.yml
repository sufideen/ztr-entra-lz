name: Zero Trust Landing Zone - CI/CD

# NOTE: default target is a throwaway sandbox tenant (Microsoft 365 Developer
# Program + Azure free subscription), not the ict-cloud.solutions production
# tenant. See THROWAWAY.md for setup. The AZURE_TENANT_ID secret in the
# "sandbox" GitHub environment must point at the sandbox tenant - the
# safety-check step below fails the run if it doesn't.

on:
  pull_request:
    branches: [main]
    paths:
      - 'bicep/**'
  push:
    branches: [main]
    paths:
      - 'bicep/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'sandbox'
        type: choice
        options: [sandbox, dev, prod]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday drift check

permissions:
  id-token: write   # required for OIDC federated login - no client secret anywhere
  contents: read
  security-events: write  # required to upload SARIF from IaC scanners

env:
  BICEP_VERSION: 'latest'

jobs:
  # ---------- Stage 1: Lint + static security scan (runs on every PR) ----------
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep
        run: az bicep install

      - name: Bicep build (syntax + type-check)
        run: az bicep build --file bicep/main.bicep

      - name: Bicep lint
        run: az bicep lint --file bicep/main.bicep

      - name: Regression test - Conditional Access policies must be report-only
        shell: pwsh
        run: Invoke-Pester -Path ./tests/ConditionalAccess.RegressionGuard.Tests.ps1 -CI

      - name: Ensure reports directory exists
        if: always()
        run: mkdir -p reports

      - name: PSRule for Azure - policy-as-code baseline
        uses: microsoft/ps-rule@v2
        continue-on-error: true  # UNVERIFIED as of 2026-07-20: the "32 findings" figure
        # this comment used to cite has no retained SARIF/output artifact anywhere in this
        # repo - it can't be confirmed or refuted without re-running the scan. Re-running
        # it locally to triage for real needs PSRule.Rules.Azure from the PowerShell
        # Gallery, which this project's usual sandboxed dev environment can't reach - do
        # that triage from a runner with real internet access (this CI job qualifies),
        # save reports/psrule-results.sarif somewhere durable, and use it to decide what's
        # real vs. stale before flipping this to a hard gate.
        with:
          modules: 'PSRule.Rules.Azure'
          inputPath: 'bicep/'
          outputFormat: Sarif
          outputPath: reports/psrule-results.sarif

      - name: Checkov IaC security scan
        uses: bridgecrewio/checkov-action@master
        # Hard gate as of 2026-07-20, re-verified with a local `checkov 3.3.8 -d bicep/
        # --framework bicep` run: 0 real failing checks against everything it can parse -
        # the sole finding (CKV_AZURE_87 on the looped Defender pricing-plan resource) is a
        # confirmed false positive, and its checkov:skip now actually registers (see
        # defenderForCloud.bicep) after a stray UTF-8 BOM in main.bicep that was silently
        # breaking Checkov's own Bicep parser got fixed too. Caveat this gate doesn't cover:
        # checkov's Bicep parser (pycep) cannot parse conditionalAccess.bicep, pim.bicep,
        # groups.bicep, or sentinel/analyticsRules.bicep at all - confirmed via direct
        # pycep.BicepParser calls, root-caused to the Graph Bicep extension's `extension`
        # declaration and Bicep's `$'''` interpolated multi-line strings, neither of which
        # this checkov version's grammar supports. Those four files get zero Checkov
        # coverage today regardless of gate status - this hard gate does not mean they're
        # clean, only that everything Checkov can actually see is.
        with:
          directory: bicep/
          framework: bicep
          output_format: sarif
          output_file_path: reports/checkov-results.sarif
          soft_fail: false

      - name: Upload SARIF results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/

  # ---------- Stage 2: What-If validation against target subscription ----------
  what-if:
    needs: lint-and-scan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'sandbox' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # federated credential configured in Entra App Registration,
          # scoped to this repo + this workflow + this environment only

      - name: Safety check - confirm target tenant is not production
        if: (github.event.inputs.environment || 'sandbox') == 'sandbox'
        run: |
          CURRENT_TENANT=$(az account show --query tenantId -o tsv)
          if [ "$CURRENT_TENANT" == "${{ secrets.PROD_TENANT_ID_DO_NOT_MATCH }}" ]; then
            echo "::error::Sandbox run is targeting the production tenant ID. Aborting."
            exit 1
          fi
          echo "Confirmed: deploying to sandbox tenant $CURRENT_TENANT"

      - name: What-If at subscription scope (human-readable)
        run: |
          az deployment sub what-if \
            --location uksouth \
            --template-file bicep/main.bicep \
            --parameters bicep/params/${{ github.event.inputs.environment || 'sandbox' }}.bicepparam \
            --parameters pipelineServicePrincipalAppId=${{ secrets.AZURE_CLIENT_ID }}

      - name: What-If at subscription scope (JSON, for the delete guard)
        run: |
          az deployment sub what-if \
            --location uksouth \
            --template-file bicep/main.bicep \
            --parameters bicep/params/${{ github.event.inputs.environment || 'sandbox' }}.bicepparam \
            --parameters pipelineServicePrincipalAppId=${{ secrets.AZURE_CLIENT_ID }} \
            --result-format FullResourcePayloads \
            -o json > whatif-result.json

      - name: Gate - block on unexpected delete of identity-plane resources
        run: ./scripts/ci/whatif-delete-guard.sh whatif-result.json

  # ---------- Stage 3: Deploy (main branch only, requires environment approval) ----------
  deploy:
    needs: what-if
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'sandbox' }}  # environment protection rule = manual approval
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true  # backs Get-Az*/Connect-AzAccount cmdlets used by tests/PostDeploy.Tests.ps1

      - name: Deploy landing zone (Bicep)
        run: |
          az deployment sub create \
            --location uksouth \
            --template-file bicep/main.bicep \
            --parameters bicep/params/${{ github.event.inputs.environment || 'sandbox' }}.bicepparam \
            --parameters pipelineServicePrincipalAppId=${{ secrets.AZURE_CLIENT_ID }} \
            --name "ztlz-${{ github.run_number }}"

      - name: Apply Conditional Access / PIM fallback (Graph PowerShell)
        if: vars.GRAPH_BICEP_EXTENSION_AVAILABLE == 'false'
        shell: pwsh
        env:
          BREAK_GLASS_GROUP_ID: ${{ secrets.BREAK_GLASS_GROUP_ID }}
        run: |
          ./scripts/graph/deploy-conditional-access.ps1 -Environment ${{ github.event.inputs.environment || 'sandbox' }}
          ./scripts/graph/deploy-pim-policies.ps1 -Environment ${{ github.event.inputs.environment || 'sandbox' }}

      - name: Install Az PowerShell modules for post-deploy tests
        shell: pwsh
        run: |
          Install-Module -Name Az.Accounts, Az.SecurityInsights, Az.Security, Az.Resources, Az.OperationalInsights `
            -Scope CurrentUser -Force -AllowClobber -Repository PSGallery

      - name: Post-deploy - live resource validation (Pester)
        shell: pwsh
        run: |
          Invoke-Pester -CI -Container (New-PesterContainer -Path './tests/PostDeploy.Tests.ps1' -Data @{ Environment = '${{ github.event.inputs.environment || 'sandbox' }}' })

  # ---------- Stage 4: Scheduled drift detection ----------
  drift-detection:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: What-If drift check against prod
        run: |
          az deployment sub what-if \
            --location uksouth \
            --template-file bicep/main.bicep \
            --parameters bicep/params/prod.bicepparam \
            --parameters pipelineServicePrincipalAppId=${{ secrets.AZURE_CLIENT_ID }} \
            --result-format FullResourcePayloads > drift-report.json
      - name: Alert on drift
        run: |
          echo "Wire this step to notify Sentinel/Teams if drift-report.json shows unexpected changes"

